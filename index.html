<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Vibe Coding Workshop</title>
<style>
:root {
  --bg: #fcfcfb;
  --ink: #111827;
  --muted: #5c6470;
  --line: #e5e7eb;
  --accent: #1f3a6b;
  --accent-soft: #e8edf6;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  min-height: 100vh;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: var(--bg);
  color: var(--ink);
}
main {
  width: min(920px, calc(100vw - 40px));
  margin: 0 auto;
  padding: 72px 0;
}
.eyebrow {
  margin: 0 0 14px;
  color: var(--accent);
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
h1 {
  margin: 0;
  font-size: clamp(34px, 7vw, 72px);
  line-height: 0.98;
  letter-spacing: 0;
}
.lead {
  max-width: 680px;
  margin: 24px 0 44px;
  color: var(--muted);
  font-size: clamp(17px, 2vw, 21px);
  line-height: 1.6;
}
.weeks {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 16px;
}
.week {
  display: block;
  min-height: 180px;
  padding: 24px;
  border: 1px solid var(--line);
  border-radius: 8px;
  color: inherit;
  text-decoration: none;
  background: #fff;
}
.week:hover {
  border-color: var(--accent);
  background: var(--accent-soft);
}
.week-num {
  display: block;
  margin-bottom: 34px;
  color: var(--accent);
  font-size: 13px;
  font-weight: 800;
  letter-spacing: 0.08em;
}
.week-title {
  display: block;
  margin-bottom: 10px;
  font-size: 24px;
  font-weight: 800;
  line-height: 1.25;
}
.week-desc {
  display: block;
  color: var(--muted);
  font-size: 15px;
  line-height: 1.5;
}
</style>
</head>
<body>
<main>
  <p class="eyebrow">HAI Lab Workshop</p>
  <h1>Vibe Coding Workshop</h1>
  <p class="lead">바이브 코딩으로 연구실 홈페이지 만들기 워크샵 자료입니다. 주차별 슬라이드를 선택해 열 수 있습니다.</p>
  <div class="weeks">
    <a class="week" href="./week1/">
      <span class="week-num">WEEK 1</span>
      <span class="week-title">연구실 홈페이지 만들기</span>
      <span class="week-desc">Codex와 바이브 코딩 흐름을 이용한 홈페이지 제작 실습</span>
    </a>
    <a class="week" href="./week2/">
      <span class="week-num">WEEK 2</span>
      <span class="week-title">Claude Code 자동화</span>
      <span class="week-desc">GitHub 기반 협업과 자동화 워크플로우 실습</span>
    </a>
  </div>
</main>
</body>
</html>
